name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.9"
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf scipalette-standalone.tar.gz -C .next/standalone .

      - uses: softprops/action-gh-release@v2
        with:
          files: scipalette-standalone.tar.gz
          generate_release_notes: true
