name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build static bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: tar -czf scipalette-static.tar.gz -C dist .

      - uses: softprops/action-gh-release@v2
        with:
          files: scipalette-static.tar.gz
          generate_release_notes: true
