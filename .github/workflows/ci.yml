name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run audit:palettes

      - run: npm run typecheck

      - run: npm run build
