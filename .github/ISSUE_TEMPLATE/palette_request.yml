name: 配色方案建议 / Palette Suggestion
description: 建议收录一个新的配色方案
labels: [palette]
body:
  - type: input
    id: name
    attributes:
      label: 配色名称 / Palette Name
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 类别 / Category
      options:
        - categorical（分类型）
        - sequential（连续型）
        - diverging（分歧型）
        - heatmap（热图）
    validations:
      required: true
  - type: textarea
    id: colors
    attributes:
      label: 颜色值 / Colors
      description: HEX 颜色，建议至少 3 个。请按数组、逗号分隔列表，或 Art2Pal 导出的 SciPalette contribution JSON 提供。
    validations:
      required: true
  - type: textarea
    id: contribution_json
    attributes:
      label: SciPalette contribution JSON（可选 / Optional）
      description: 如果你从 Art2Pal 复制了 SciPalette contribution JSON，可以直接粘贴到这里。不要手写 id。
      render: json
  - type: dropdown
    id: colorblind
    attributes:
      label: 是否色盲友好 / Colorblind-safe?
      options:
        - "是 / Yes"
        - "否 / No"
        - "未验证 / Not verified"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 适用场景 / Use Case
    validations:
      required: true
