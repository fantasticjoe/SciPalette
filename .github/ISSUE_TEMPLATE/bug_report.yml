name: Bug 报告 / Bug Report
description: 报告一个问题 / Report a problem
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 清晰简要地描述这个 Bug。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为 / Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境 / Environment
      placeholder: "Node: 22.0.0, OS: macOS 15, Browser: Chrome 130"
    validations:
      required: false
